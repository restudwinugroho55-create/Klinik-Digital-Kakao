<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klinik Digital Kakao</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url('ChatGPT Image 16 Mei 2026, 19.48.44.png');

    background-size:cover;
    background-position:center;
}

.container{
    width:100%;
    max-width:460px;

    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:30px;

    padding:35px 25px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.30);
}

.ChatGPT Image 16 Mei 2026, 19.51.33.png{
    width:90px;
    margin-bottom:12px;
}

.title{
    font-size:52px;
    font-weight:800;
    color:white;
    line-height:1.05;
    margin-bottom:14px;
}

.subtitle{
    color:rgba(255,255,255,0.88);
    font-size:17px;
    margin-bottom:34px;
    line-height:1.5;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.button{
    display:flex;
    align-items:center;
    justify-content:center;

    gap:14px;

    text-decoration:none;

    color:white;

    font-size:18px;
    font-weight:bold;

    padding:18px;

    border-radius:20px;

    transition:0.25s;

    border:1px solid rgba(255,255,255,0.10);

    box-shadow:0 5px 15px rgba(0,0,0,0.18);
}

.button:hover{
    transform:translateY(-3px);
}

.icon{
    width:42px;
    height:42px;

    border-radius:14px;

    background:rgba(255,255,255,0.18);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;
}

.laporan{
    background:linear-gradient(135deg,#24a148,#1f7a4d);
}

.kalender{
    background:linear-gradient(135deg,#ffb300,#ff9800);
}

.tutorial{
    background:linear-gradient(135deg,#1976ff,#0056b3);
}

.darurat{
    background:linear-gradient(135deg,#e53935,#b71c1c);
}

.saran{
    background:linear-gradient(135deg,#7b2ff7,#512da8);
}

.footer{
    margin-top:28px;
    color:rgba(255,255,255,0.70);
    font-size:12px;
}

/* HP */
@media(max-width:600px){

.title{
    font-size:40px;
}

.subtitle{
    font-size:15px;
}

.button{
    font-size:16px;
    padding:16px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="logo-kakao.png" class="logo-kakao">

<div class="title">
Klinik Digital Kakao
</div>

<div class="subtitle">
Deteksi Dini Penyakit Busuk Buah Kakao
</div>

<div class="menu">

<a class="button laporan" href="LINK_LAPORAN" target="_blank">

<div class="icon">📋</div>

LAPORAN

</a>

<a class="button kalender" href="LINK_KALENDER" target="_blank">

<div class="icon">📅</div>

KALENDER PEMANGKASAN

</a>

<a class="button tutorial" href="LINK_TUTORIAL" target="_blank">

<div class="icon">▶️</div>

TUTORIAL PENGISIAN

</a>

<a class="button darurat" href="LINK_DARURAT" target="_blank">

<div class="icon">🚨</div>

KONTAK DARURAT

</a>

<a class="button saran" href="LINK_SARAN" target="_blank">

<div class="icon">💡</div>

SARAN & MASUKAN

</a>

</div>

<div class="footer">
Klinik Digital Kakao © 2026
</div>

</div>

</body>
</html>
