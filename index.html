<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klinik Digital Kakao</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
    url('BACKGROUND.jpg');
    background-size:cover;
    background-position:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:30px;
    padding:30px 22px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:white;
    margin-bottom:10px;
}

.subtitle{
    color:rgba(255,255,255,0.85);
    margin-bottom:30px;
    font-size:14px;
    line-height:1.6;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.button{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:bold;
    padding:20px;
    border-radius:22px;
    transition:0.25s;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.button:hover{
    transform:translateY(-4px) scale(1.02);
}

.icon{
    width:42px;
    height:42px;
    background:rgba(255,255,255,0.18);
    border-radius:14px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

.laporan{
    background:linear-gradient(135deg,#28a745,#1f7a4d);
}

.kalender{
    background:linear-gradient(135deg,#ffc107,#ff9800);
}

.tutorial{
    background:linear-gradient(135deg,#007bff,#0056b3);
}

.darurat{
    background:linear-gradient(135deg,#dc3545,#a71d2a);
}

.saran{
    background:linear-gradient(135deg,#6f42c1,#512da8);
}

.footer{
    margin-top:25px;
    color:rgba(255,255,255,0.7);
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Klinik Digital Kakao
</div>

<div class="subtitle">
Deteksi Dini Penyakit Busuk Buah Kakao
</div>

<div class="menu">

<a class="button laporan" href="LINK_LAPORAN" target="_blank">

<div class="icon">📋</div>

LAPORAN

</a>

<a class="button kalender" href="LINK_KALENDER" target="_blank">

<div class="icon">📅</div>

KALENDER PEMANGKASAN

</a>

<a class="button tutorial" href="LINK_TUTORIAL" target="_blank">

<div class="icon">▶️</div>

TUTORIAL PENGISIAN

</a>

<a class="button darurat" href="LINK_DARURAT" target="_blank">

<div class="icon">🚨</div>

KONTAK DARURAT

</a>

<a class="button saran" href="LINK_SARAN" target="_blank">

<div class="icon">💡</div>

SARAN & MASUKAN

</a>

</div>

<div class="footer">
Klinik Digital Kakao © 2026
</div>

</div>

</body>
</html>
